<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Findis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="bg-black text-gray-200 font-sans">

<header class="bg-[#0a0a0a] border-b border-[#2a2a2a] py-3 sticky top-0 z-10">
    <div class="container mx-auto px-4 flex items-center justify-between flex-wrap gap-4">
        <div class="text-3xl font-black text-orange-500 tracking-tight">
            <a href="index.html">Findis</a>
        </div>
        <div class="flex-grow max-w-md mx-4">
            <input type="text" placeholder="Поиск ресторанов или акций..."
                   class="w-full px-4 py-2 bg-[#1a1a1a] border border-[#333] rounded-full text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>
        <div class="flex items-center space-x-4">
            <button class="relative">
                <span class="favorite-icon">♡</span>
                <span class="absolute -top-1 -right-2 favorite-badge rounded-full w-4 h-4 flex items-center justify-center">3</span>
            </button>
            <a href="login.html" class="text-gray-300 hover:text-orange-500 font-medium">Войти</a>
            <a href="register.html" class="bg-orange-500 text-black px-5 py-2 rounded-full font-semibold hover:bg-orange-400 transition">Регистрация</a>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-12">
    <div class="max-w-md mx-auto bg-[#151515] border border-[#2a2a2a] rounded-xl p-8">
        <h1 class="text-3xl font-bold text-white text-center mb-6">Регистрация</h1>

        <form action="#" method="post" class="space-y-5">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-300 mb-1">Имя</label>
                <input type="text" id="name" name="name" placeholder="Иван Иванов"
                       class="w-full px-4 py-3 bg-[#1a1a1a] border border-[#333] rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-orange-500">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                <input type="email" id="email" name="email" placeholder="example@mail.ru"
                       class="w-full px-4 py-3 bg-[#1a1a1a] border border-[#333] rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-orange-500">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Пароль</label>
                <input type="password" id="password" name="password" placeholder="••••••••"
                       class="w-full px-4 py-3 bg-[#1a1a1a] border border-[#333] rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-orange-500">
            </div>
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-300 mb-1">Подтверждение пароля</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••"
                       class="w-full px-4 py-3 bg-[#1a1a1a] border border-[#333] rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-orange-500">
            </div>
            <button type="submit"
                    class="w-full bg-orange-500 text-black px-6 py-3 rounded-lg font-semibold hover:bg-orange-400 transition">
                Зарегистрироваться
            </button>
        </form>

        <p class="text-center text-gray-400 mt-6">
            Уже есть аккаунт?
            <a href="login.html" class="text-orange-500 hover:underline">Войти</a>
        </p>
    </div>
</main>

<footer id="footer" class="bg-[#0a0a0a] border-t border-[#2a2a2a] py-8">
    <div class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div>
            <h3 class="font-bold text-lg mb-2 text-white">Findis</h3>
            <p class="text-gray-400 text-sm">Быстрый поиск акций фастфуда рядом с вами</p>
        </div>
        <div id="contacts-block">
            <h4 class="font-semibold mb-2 text-white">Контакты</h4>
            <ul class="text-sm text-gray-400 space-y-1">
                <li>Email: <a href="mailto:support@findis.ru" class="text-orange-500 hover:underline">support@findis.ru</a></li>
                <li>Соцсети:
                    <a href="https://vk.com/kechpek" class="text-orange-500 hover:underline">VK</a>,
                    <a href="https://t.me/katerinka_228" class="text-orange-500 hover:underline">Telegram</a>
                </li>
            </ul>
        </div>
        <div>
            <h4 class="font-semibold mb-2 text-white">Информация</h4>
            <ul class="text-sm text-gray-400 space-y-1">
                <li><a href="about-faq.html#about" class="hover:text-orange-500">О проекте</a></li>
                <li><a href="about-faq.html#faq" class="hover:text-orange-500">FAQ</a></li>
            </ul>
        </div>
    </div>
    <div class="container mx-auto px-4 mt-8 pt-4 border-t border-[#2a2a2a] text-center text-sm text-gray-500">
        © 2026 Findis.
    </div>
</footer>

</body>
</html>
